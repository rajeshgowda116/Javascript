<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dom projects</title>
</head>
<p>Youtube subscribe button</p>
<button onclick="
 subscribe();
 " class="subs">
  Subscribe
</button>

<body>
  <script>
    function subscribe() {
      const butt = document.querySelector('.subs');
      if (butt.innerText === 'Subscribe') {
        butt.innerText = 'Subscribed';
      }
      else {
        butt.innerText = 'Subscribe';
      }

    }
  </script>
</body>

</html>
